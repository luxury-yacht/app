<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Yacht</title>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          sans-serif;
      }
    </style>
    <script>
      // Set the resolved appearance mode and replay precomputed CSS variables
      // immediately to prevent FOUC. Color math lives in TypeScript utilities;
      // this startup path only applies the cached result.
      (() => {
        var preference = localStorage.getItem('app-appearance-mode-preference');
        // Migration from localStorage written before the appearance-mode rename.
        // The old key stored the light/dark/system mode preference.
        // TODO: Remove after the old app-theme-preference localStorage key is no longer supported.
        var oldPreference = localStorage.getItem('app-theme-preference');
        if (!preference && oldPreference) {
          preference = oldPreference;
          localStorage.setItem('app-appearance-mode-preference', oldPreference);
          localStorage.removeItem('app-theme-preference');
        }

        // If no preference, default to 'system'
        if (!preference) {
          preference = 'system';
          localStorage.setItem('app-appearance-mode-preference', 'system');
        }

        var mode = preference;

        // If system mode is selected, detect the actual mode to use.
        if (preference === 'system') {
          mode =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        }

        document.documentElement.setAttribute('data-appearance-mode', mode);
        document.documentElement.className = mode;

        try {
          var rawBootstrap = localStorage.getItem('app-appearance-bootstrap-v1');
          if (!rawBootstrap) return;

          var bootstrap = JSON.parse(rawBootstrap);
          var variables = bootstrap && bootstrap.version === 1 ? bootstrap[mode] : null;
          if (!variables || typeof variables !== 'object') return;

          var root = document.documentElement;
          for (var token in variables) {
            if (
              Object.hasOwn(variables, token) &&
              token.indexOf('--') === 0 &&
              typeof variables[token] === 'string'
            ) {
              root.style.setProperty(token, variables[token]);
            }
          }
        } catch (_error) {
          // Ignore invalid cached appearance data; React will rehydrate settings.
        }
      })();
    </script>
  </head>

  <body>
    <div id="app" style="flex: 1; display: flex"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
